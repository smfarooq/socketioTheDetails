<h1>Express server waiting for sockets!</h1>
<script src="/socket.io/socket.io.js"></script>

<script>
    //socket.io.js is the client library for socket.io, it allows us to connect to the server and communicate with it using websockets.
    //socket.io.js is going to add a global variable called io, which is the client library for socket.io, 
    // it allows us to connect to the server and communicate with it using websockets.  
const socket = io('http://localhost:8000') // this will connect to the server at the same origin as the page, 
// if the server is running on a different origin, you can pass the URL of the server as an argument to io().
socket.on('connect', () => {
    console.log('Connected to server')
    console.log(socket.id) // this will log the unique id of the socket, which is generated by the server when the connection is established.
    socket.on('messageFromServer', (data) => { // this event is triggered when the server sends a message to the client
    console.log(data) // this will log the data sent by the server, which in this case is the welcome message.
    })
    socket.emit('messageFromClient', {data: 'Hello from the client!'}) // this sends a message to the server, which can be received by the server using the 'messageFromClient' event.
});

console.log(io)
</script>
